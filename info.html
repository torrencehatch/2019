<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Info - 2019 ink</title>
    <style>
        body { 
            margin: 0;
            padding: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        
        .map-container {
            width: 80vw;
            height: 80vh;
            border: 2px solid #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2);
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .back-btn {
            position: fixed;
            top: 30px;
            left: 30px;
            color: #fff;
            text-decoration: none;
            padding: 15px 25px;
            border: 2px solid #fff;
            background: rgba(0, 0, 0, 0.8);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border-radius: 5px;
        }
        
        .back-btn:hover {
            background: #fff;
            color: #000;
        }
        
        @media (max-width: 768px) {
            .map-container {
                width: 95vw;
                height: 85vh;
            }
            
            .back-btn {
                top: 20px;
                left: 20px;
                padding: 12px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
