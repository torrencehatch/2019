
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Shop - 2019 ink</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Helvetica', Arial, sans-serif;
            text-align: center;
        }

        .back-btn {
            position: fixed;
            top: calc(30px + env(safe-area-inset-top));
            left: 30px;
            color: #fff;
            text-decoration: none;
            padding: 15px 25px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            background: rgba(0, 0, 0, 0.85);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border-radius: 8px;
            z-index: 100;
            -webkit-tap-highlight-color: transparent;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.95);
            color: #000;
            transform: translateY(-2px);
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 60px;
            margin: 100px auto;
            max-width: 900px;
            padding: 0 20px;
        }

        .products a img {
            width: 100%;
            max-width: 400px;
            margin: auto;
            display: block;
            transition: transform 0.3s ease;
        }

        .products a img:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back</a>
    <div class="products">
        <a href="https://buy.stripe.com/aFa7sLblw0GH7hT5kJ4c801">
            <img src="black-shirt.png" alt="BNKR Wire Design Shirt">
        </a>
        <a href="https://buy.stripe.com/aFa8wPahs4WXgSt8wV4c800">
            <img src="red-shirt.png" alt="2019 ink Red Design Shirt">
        </a>
    </div>
</body>
</html>
