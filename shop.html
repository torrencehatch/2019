<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Shop - 2019 ink</title>
    <style>
        html {
            margin: 0;
            padding: 0;
            background: #000;
            height: 100%;
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
        }
        
        body { 
            margin: 0;
            padding: 0;
            padding-top: env(safe-area-inset-top);
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            height: 100%;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transform: translateZ(0);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            padding-top: calc(40px + env(safe-area-inset-top));
            box-sizing: border-box;
        }
        
        h1 {
            font-size: 3rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 60px;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            justify-content: center;
        }
        
        .back-btn {
            position: fixed;
            top: calc(30px + env(safe-area-inset-top));
            left: 30px;
            color: #fff;
            text-decoration: none;
            padding: 15px 25px;
            border: 2px solid #fff;
            background: rgba(0, 0, 0, 0.8);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border-radius: 5px;
            z-index: 100;
            -webkit-tap-highlight-color: transparent;
        }
        
        .back-btn:hover {
            background: #fff;
            color: #000;
        }
        
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 60px;
            margin-top: 40px;
        }
        
        .product {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .product:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        .product-image {
            width: 100%;
            max-width: 300px;
            height: 300px;
            margin: 0 auto 30px;
            border-radius: 10px;
            overflow: hidden;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        
        .product:hover .product-image img {
            transform: scale(1.05);
        }
        
        .product-title {
            display: none;
        }
        
        .product-price {
            display: none;
        }
        
        .product-description {
            display: none;
        }
        
        .buy-btn {
            display: none;
        }
        
        /* Shirt 1 - Red design */
        .red-shirt {
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            position: relative;
            overflow: hidden;
        }
        
        .red-design {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: 900;
            color: #d32f2f;
            text-transform: lowercase;
            letter-spacing: -2px;
        }
        
        .red-design::before {
            content: '';
            position: absolute;
            top: -20px;
            left: -20px;
            right: -20px;
            bottom: -20px;
            background: 
                linear-gradient(45deg, transparent 40%, #d32f2f 41%, #d32f2f 42%, transparent 43%),
                linear-gradient(-45deg, transparent 40%, #d32f2f 41%, #d32f2f 42%, transparent 43%),
                linear-gradient(135deg, transparent 40%, #d32f2f 41%, #d32f2f 42%, transparent 43%),
                linear-gradient(-135deg, transparent 40%, #d32f2f 41%, #d32f2f 42%, transparent 43%);
            opacity: 0.3;
            z-index: -1;
        }
        
        /* Shirt 2 - Wire text design */
        .black-shirt {
            background: #1a1a1a;
            position: relative;
        }
        
        .wire-design {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 36px;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        
        .wire-design::after {
            content: '';
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 40px;
            background: 
                linear-gradient(45deg, transparent 35%, #fff 36%, #fff 38%, transparent 39%),
                linear-gradient(-45deg, transparent 35%, #fff 36%, #fff 38%, transparent 39%),
                linear-gradient(135deg, transparent 35%, #fff 36%, #fff 38%, transparent 39%);
        }
        
        @media (max-width: 768px) {
            .products {
                grid-template-columns: 1fr;
                gap: 40px;
            }
            
            .back-btn {
                top: calc(20px + env(safe-area-inset-top));
                left: 20px;
                padding: 12px 20px;
                font-size: 14px;
            }
            
            h1 {
                font-size: 2rem;
                margin-bottom: 40px;
            }
            
            .product {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back</a>
    
    <div class="container">
        <canvas id="shopTitle"></canvas>
        
        <div class="products">
            <!-- Red Design Shirt -->
            <a href="#" class="product">
                <div class="product-image">
                    <img src="red-shirt.png" alt="2019 ink Red Design Shirt">
                </div>
                <div class="product-title">2019 ink Red Tee</div>
                <div class="product-price">$35</div>
                <div class="product-description">
                    Bold red design on premium white cotton. Features the iconic 2019 ink logo with dynamic line artwork.
                </div>
                <div class="buy-btn">Buy Now</div>
            </a>
            
            <!-- Black Wire Design Shirt -->
            <a href="#" class="product">
                <div class="product-image">
                    <img src="black-shirt.png" alt="BNKR Wire Design Shirt">
                </div>
                <div class="product-title">BNKR Wire Tee</div>
                <div class="product-price">$35</div>
                <div class="product-description">
                    Minimalist wire-frame typography on premium black cotton. Clean, architectural design aesthetic.
                </div>
                <div class="buy-btn">Buy Now</div>
            </a>
        </div>
    </div>
</body>
</html>
