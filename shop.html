<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Shop - 2019 ink</title>
    <style>
        html {
            margin: 0;
            padding: 0;
            background: #000;
            height: 100%;
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
        }
        
        body { 
            margin: 0;
            padding: 0;
            padding-top: env(safe-area-inset-top);
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            height: 100%;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transform: translateZ(0);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            padding-top: calc(40px + env(safe-area-inset-top));
            box-sizing: border-box;
        }
        
        .back-btn {
            position: fixed;
            top: calc(30px + env(safe-area-inset-top));
            left: 30px;
            color: #fff;
            text-decoration: none;
            padding: 15px 25px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            background: rgba(0, 0, 0, 0.85);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border-radius: 8px;
            z-index: 100;
            -webkit-tap-highlight-color: transparent;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.95);
            color: #000;
            transform: translateY(-2px);
        }
        
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 60px;
            margin-top: 40px;
        }
        
        .product {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .product:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
        }
        
        .product-image {
            width: 100%;
            max-width: 300px;
            height: 300px;
            margin: 0 auto 30px;
            border-radius: 10px;
            overflow: hidden;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        
        .product:hover .product-image img {
            transform: scale(1.05);
        }
        
        .product-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .product-price {
            font-size: 28px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 20px;
        }
        
        .product-description {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
            line-height: 1.5;
        }
        
        .buy-btn {
            background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
            text-decoration: none;
            margin-top: 10px;
        }
        
        .buy-btn:hover {
            background: linear-gradient(135deg, #f0f0f0 0%, #e0e0e0 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 255, 255, 0.2);
        }
        
        .limited-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 20px;
            font-style: italic;
            letter-spacing: 0.5px;
        }
        
        .material-text {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 20px;
            font-weight: 500;
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }
        
        .size-options {
            margin: 20px 0;
        }
        
        .size-options label {
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: block;
        }
        
        .size-select {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 16px;
            width: 100%;
            max-width: 200px;
        }
        
        .payment-icons {
            margin-top: 15px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }
        
        /* Mock shirt designs */
        .black-shirt-design {
            background: #1a1a1a;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 2px;
        }
        
        .red-shirt-design {
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d32f2f;
            font-size: 28px;
            font-weight: 900;
        }
        
        @media (max-width: 768px) {
            .products {
                grid-template-columns: 1fr;
                gap: 40px;
            }
            
            .back-btn {
                top: calc(20px + env(safe-area-inset-top));
                left: 20px;
                padding: 12px 20px;
                font-size: 14px;
            }
            
            .product {
                padding: 25px 20px;
            }
            
            .product-title {
                font-size: 20px;
            }
            
            .product-price {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back</a>
    
    <div class="container">
        <div class="products">
            <!-- Black Wire Design Shirt -->
            <div class="product">
                <div class="product-image">
                    <div class="black-shirt-design">BNKR</div>
                </div>
                <div class="product-info">
                    <span class="product-price">$30</span>
                    <span class="limited-text">Limited to 10 pcs</span>
                    <span class="material-text">100% Cotton</span>
                </div>
                <div class="size-options">
                    <label for="black-size">Size:</label>
                    <select id="black-size" class="size-select">
                        <option value="s">Small</option>
                        <option value="m" selected>Medium</option>
                        <option value="l">Large</option>
                        <option value="xl">X-Large</option>
                    </select>
                </div>
                <!-- Replace this URL with your actual Stripe Payment Link -->
                <a href="https://buy.stripe.com/aFa8wPahs4WXgSt8wV4c800" class="buy-btn">
                    Buy Now
                </a>
            </div>
            
            <!-- Red Design Shirt -->
            <div class="product">
                <div class="product-image">
                    <div class="red-shirt-design">2019 ink</div>
                </div>
                <div class="product-info">
                    <span class="product-price">$30</span>
                    <span class="limited-text">Limited to 10 pcs</span>
                    <span class="material-text">100% Cotton</span>
                </div>
                <div class="size-options">
                    <label for="red-size">Size:</label>
                    <select id="red-size" class="size-select">
                        <option value="s">Small</option>
                        <option value="m" selected>Medium</option>
                        <option value="l">Large</option>
                        <option value="xl">X-Large</option>
                    </select>
                </div>
                <!-- Replace this URL with your actual Stripe Payment Link -->
                <a href="https://buy.stripe.com/test_your_payment_link_here_2" class="buy-btn">
                    Buy Now
                </a>
            </div>
        </div>
    </div>
</body>
</html>
