<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <link rel="preload" href="fonts/Ghastly Panic.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="fonts/helvetica-bold.woff2" as="font" type="font/woff2" crossorigin>
    <title>2019 ink</title>
    <style>
        /* Font Definitions */
        @font-face {
            font-family: 'Helvetica';
            src: url('fonts/helvetica-bold.woff2') format('woff2'),
                 url('fonts/helvetica-bold.woff') format('woff');
            font-weight: bold;
            font-style: normal;
            font-display: block;
        }
        
        @font-face {
            font-family: 'Ghastly Panic';
            src: url('fonts/Ghastly Panic.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
            font-display: block;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            background: #000;
            height: 100%;
            width: 100%;
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        body {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            font-family: Arial, sans-serif;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            text-align: center;
            gap: 80px;
            padding: 15vh 20px 50px;
            background: #000;
        }
        
        canvas {
            display: block;
            max-width: 100%;
            max-height: 50vh;
            opacity: 0;
            transition: opacity 0.3s ease;
            will-change: opacity;
        }
        
        canvas.loaded {
            opacity: 1;
        }
        
        .buttons {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            background: transparent;
            border: none;
            color: #fff;
            padding: 0;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s ease-out;
            outline: none;
            border-radius: 4px;
            -webkit-tap-highlight-color: transparent;
        }
        
        .btn:focus-visible {
            outline: 2px solid #fff;
            outline-offset: 4px;
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .btn canvas {
            cursor: pointer;
        }
        
        /* Mobile Optimizations */
        @media (max-width: 768px) {
            .container {
                gap: 60px;
                padding-top: 10vh;
            }
            
            .buttons {
                gap: 40px;
                flex-direction: column;
                align-items: center;
            }
        }
        
        @media (max-width: 480px) {
            .container {
                gap: 50px;
                padding-top: 8vh;
            }
        }
        
        /* Touch Device Optimizations */
        @media (hover: none) and (pointer: coarse) {
            .btn:hover {
                transform: none;
            }
            
            .btn:active {
                transform: scale(0.95);
                transition: transform 0.05s ease-out;
            }
        }
        
        /* Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            .btn, canvas {
                transition: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="logoCanvas"></canvas>
        <div class="buttons">
            <a href="shop.html" class="btn" id="shopBtn" aria-label="Shop - Browse our products">
                <canvas class="btn-canvas" data-text="SHOP"></canvas>
            </a>
            <a href="info.html" class="btn" id="infoBtn" aria-label="Info - Learn more about us">
                <canvas class="btn-canvas" data-text="INFO"></canvas>
            </a>
        </div>
    </div>

    <script>
        class FuzzyText {
            constructor(canvas, options = {}) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                
                if (!this.ctx) {
                    console.error('Canvas context not available');
                    return;
                }
                
                // Configuration
                this.text = options.text || 'TEXT';
                this.fontSize = options.fontSize || 60;
                this.fontWeight = options.fontWeight || 'bold';
                this.fontFamily = options.fontFamily || 'Helvetica, Arial, sans-serif';
                this.color = options.color || '#fff';
                this.enableHover = options.enableHover !== false;
                this.baseIntensity = options.baseIntensity || 0.15;
                this.hoverIntensity = options.hoverIntensity || 0.4;
                
                // State
                this.isHovering = false;
                this.isVisible = true;
                this.animationFrameId = null;
                this.fuzzRange = 30;
                
                this.init();
            }
            
            async init() {
                try {
                    // Wait for font loading
                    await new Promise(resolve => setTimeout(resolve, 800));
                    
                    this.setupCanvas();
                    this.setupEventListeners();
                    this.setupVisibilityHandling();
                    this.startAnimation();
                    
                    // Show canvas once ready
                    setTimeout(() => {
                        this.canvas.classList.add('loaded');
                    }, 100);
                    
                } catch (error) {
                    console.error('FuzzyText initialization failed:', error);
                }
            }
            
            setupCanvas() {
                // Create offscreen canvas for text rendering
                this.offscreen = document.createElement('canvas');
                this.offCtx = this.offscreen.getContext('2d');
                
                if (!this.offCtx) {
                    console.error('Offscreen canvas context not available');
                    return;
                }
                
                // Measure text
                this.offCtx.font = `${this.fontWeight} ${this.fontSize}px ${this.fontFamily}`;
                this.offCtx.textBaseline = 'alphabetic';
                const metrics = this.offCtx.measureText(this.text);
                
                // Calculate dimensions
                const actualLeft = metrics.actualBoundingBoxLeft ?? 0;
                const actualRight = metrics.actualBoundingBoxRight ?? metrics.width;
                const actualAscent = metrics.actualBoundingBoxAscent ?? this.fontSize;
                const actualDescent = metrics.actualBoundingBoxDescent ?? this.fontSize * 0.2;
                
                const textWidth = Math.ceil(actualLeft + actualRight);
                const textHeight = Math.ceil(actualAscent + actualDescent);
                
                // Setup offscreen canvas
                const buffer = 10;
                this.offscreen.width = textWidth + buffer;
                this.offscreen.height = textHeight;
                
                // Draw text to offscreen canvas
                const xOffset = buffer / 2;
                this.offCtx.font = `${this.fontWeight} ${this.fontSize}px ${this.fontFamily}`;
                this.offCtx.textBaseline = 'alphabetic';
                this.offCtx.fillStyle = this.color;
                this.offCtx.fillText(this.text, xOffset - actualLeft, actualAscent);
                
                // Setup main canvas
                const margin = 50;
                this.canvas.width = this.offscreen.width + margin * 2;
                this.canvas.height = this.offscreen.height + margin * 2;
                this.ctx.translate(margin, margin);
                
                // Store dimensions for interaction
                this.interactiveLeft = margin + xOffset;
                this.interactiveTop = margin;
                this.interactiveRight = this.interactiveLeft + textWidth;
                this.interactiveBottom = this.interactiveTop + textHeight;
            }
            
            setupEventListeners() {
                if (!this.enableHover) return;
                
                const handleInteraction = (e) => {
                    const rect = this.canvas.getBoundingClientRect();
                    const x = (e.clientX || e.touches?.[0]?.clientX) - rect.left;
                    const y = (e.clientY || e.touches?.[0]?.clientY) - rect.top;
                    this.isHovering = this.isInsideTextArea(x, y);
                };
                
                const handleEnd = () => {
                    this.isHovering = false;
                };
                
                // Unified event handling
                this.canvas.addEventListener('mousemove', handleInteraction);
                this.canvas.addEventListener('touchmove', handleInteraction, { passive: true });
                this.canvas.addEventListener('mouseleave', handleEnd);
                this.canvas.addEventListener('touchend', handleEnd);
                
                // Store cleanup function
                this.cleanup = () => {
                    this.canvas.removeEventListener('mousemove', handleInteraction);
                    this.canvas.removeEventListener('touchmove', handleInteraction);
                    this.canvas.removeEventListener('mouseleave', handleEnd);
                    this.canvas.removeEventListener('touchend', handleEnd);
                };
            }
            
            setupVisibilityHandling() {
                const handleVisibilityChange = () => {
                    if (document.hidden) {
                        this.isVisible = false;
                        this.stopAnimation();
                    } else {
                        this.isVisible = true;
                        this.startAnimation();
                    }
                };
                
                document.addEventListener('visibilitychange', handleVisibilityChange);
                
                // Add to cleanup
                const originalCleanup = this.cleanup || (() => {});
                this.cleanup = () => {
                    originalCleanup();
                    document.removeEventListener('visibilitychange', handleVisibilityChange);
                };
            }
            
            isInsideTextArea(x, y) {
                return x >= this.interactiveLeft && x <= this.interactiveRight &&
                       y >= this.interactiveTop && y <= this.interactiveBottom;
            }
            
            startAnimation() {
                if (!this.isVisible || this.animationFrameId) return;
                
                const animate = () => {
                    if (!this.isVisible) return;
                    
                    // Clear canvas
                    this.ctx.clearRect(
                        -this.fuzzRange, -this.fuzzRange,
                        this.offscreen.width + 2 * this.fuzzRange,
                        this.offscreen.height + 2 * this.fuzzRange
                    );
                    
                    // Apply fuzzy effect
                    const intensity = this.isHovering ? this.hoverIntensity : this.baseIntensity;
                    
                    for (let j = 0; j < this.offscreen.height; j++) {
                        const dx = Math.floor(intensity * (Math.random() - 0.5) * this.fuzzRange);
                        this.ctx.drawImage(
                            this.offscreen, 0, j, this.offscreen.width, 1,
                            dx, j, this.offscreen.width, 1
                        );
                    }
                    
                    this.animationFrameId = requestAnimationFrame(animate);
                };
                
                animate();
            }
            
            stopAnimation() {
                if (this.animationFrameId) {
                    cancelAnimationFrame(this.animationFrameId);
                    this.animationFrameId = null;
                }
            }
            
            destroy() {
                this.stopAnimation();
                if (this.cleanup) {
                    this.cleanup();
                }
            }
        }
        
        // Initialize application
        async function initializeApp() {
            // Wait for font loading
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            const logoCanvas = document.getElementById('logoCanvas');
            if (!logoCanvas) {
                console.error('Logo canvas not found');
                return;
            }
            
            // Responsive font sizing
            const isMobile = window.innerWidth <= 768;
            const logoFontSize = isMobile ? 140 : 200;
            const buttonFontSize = isMobile ? 40 : 60;
            
            // Create main logo
            new FuzzyText(logoCanvas, {
                text: '2019 ink',
                fontSize: logoFontSize,
                fontWeight: 'normal',
                fontFamily: 'Ghastly Panic',
                color: '#fff',
                baseIntensity: 0.2,
                hoverIntensity: 0.5,
                enableHover: true
            });
            
            // Create button texts
            document.querySelectorAll('.btn-canvas').forEach(canvas => {
                const text = canvas.getAttribute('data-text');
                new FuzzyText(canvas, {
                    text: text,
                    fontSize: buttonFontSize,
                    fontWeight: 'bold',
                    fontFamily: 'Helvetica',
                    color: '#fff',
                    baseIntensity: 0.15,
                    hoverIntensity: 0.4,
                    enableHover: true
                });
            });
        }
        
        // Start when page loads
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeApp);
        } else {
            initializeApp();
        }
        
        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            // Cancel any remaining animation frames
            for (let i = 0; i < 10000; i++) {
                cancelAnimationFrame(i);
            }
        });
    </script>
</body>
</html>
